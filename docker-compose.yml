version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ivep-backend
    env_file:
      - ./backend/.env
    restart: always
    expose:
      - "8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: ivep-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: ivep-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_uploads:/var/www/uploads:ro
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot

volumes:
  backend_uploads:
  redis_data:
  letsencrypt:
  certbot_webroot:
